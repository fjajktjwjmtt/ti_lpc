name: MinGW64 Auto Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # ① コードをWindowsサーバーに持ってくる
      - name: Checkout code
        uses: actions/checkout@v4

      # ② MINGW64環境を構築し、FLTK1.3 と RtAudio をインストール
      - name: Setup MSYS2 (MinGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # エラーの出た libXt を削り、安定して取得できるパッケージのみに絞りました
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-make
            mingw-w64-x86_64-fltk1.3
            mingw-w64-x86_64-rtaudio

      # ③ MINGW64のシェル上でビルドを実行
      - name: Compile Source
        shell: msys2 {0}
        run: make

      # ④ ビルドした成果物を保存
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-application
          path: |
            *.exe
            build/*.exe
