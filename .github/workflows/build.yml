name: MinGW64 Auto Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-fltk
            mingw-w64-ucrt-x86_64-rtaudio
            mingw-w64-ucrt-x86_64-rtmidi
      - name: Compile Source
        shell: msys2 {0}
        # インストールが成功したので、このコマンドが正しく動くようになります
        run: mingw32-make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-application
          path: |
            *.exe
            build/*.exe
