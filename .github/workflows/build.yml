name: MinGW64 Auto Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          # パッケージ名を x86_64 から ucrt-x86_64 に修正
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-fltk
            mingw-w64-ucrt-x86_64-rtaudio

      - name: Compile Source
        shell: msys2 {0}
        # mingw32-make から make に変更（もし Makefile 側で mingw32-make が必須なら、ここはそのままにしてください）
        run: make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-application
          path: |
            *.exe
            build/*.exe
