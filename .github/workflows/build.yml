name: Build Windows Executable (Native)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. ソースコードのチェックアウト
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. MSYS2環境のセットアップ（MinGW-w64ツールチェーンとライブラリをまとめて導入）
    - name: Setup MSYS2 and Install Dependencies
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-fltk
          mingw-w64-x86_64-rtaudio
          mingw-w64-x86_64-rtmidi
          make

    # 3. Windows環境用のビルド実行
    # MSYS2のシェル上で Makefile を実行します
    # 3. エラーの原因となる厳密な型チェック（narrowing）のみを無効化してビルド
    # 3. Windows向けのマクロ定義を明示し、かつ型チェックエラーを回避してビルド
    - name: Build with Make
      shell: msys2 {0}
      run: |
        make CXXFLAGS="-O3 -DWIN32 -Dcompile_for_windows -Wno-narrowing" CFLAGS="-O3 -DWIN32 -Dcompile_for_windows -Wno-narrowing" OUT=ti_lpc.exe



    # 4. 実行ファイル（.exe）をGitHub上に保存
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ti_lpc-windows-x64
        path: ti_lpc.exe
