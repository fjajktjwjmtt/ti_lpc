name: Build Windows Executable (Native)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. ソースコードのチェックアウト
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. MSYS2環境のセットアップ（MinGW-w64ツールチェーンとライブラリをまとめて導入）
    - name: Setup MSYS2 and Install Dependencies
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-fltk
          mingw-w64-x86_64-rtaudio
          mingw-w64-x86_64-rtmidi
          make

    # 3. Windows環境用のビルド実行
    # MSYS2のシェル上で Makefile を実行します
    # 3. エラーの原因となる厳密な型チェック（narrowing）のみを無効化してビルド
    # 3. Windows向けのマクロ定義を明示し、かつ型チェックエラーを回避してビルド
    # 3. Windows環境の衝突回避マクロ、ビルド日、および64bitポインタキャストを許可してビルド
    # 3. Windowsの予約語（s_addr）を自動置換した上で、マクロフラグを渡してビルド
    # 3. 不足しているヘッダーの自動追加、および各種衝突回避フラグを渡してビルド
    # 3. C++の規格を固定し、型衝突を回避してビルド
    # 3. std::byte の定義を強制無効化し、型衝突を完全に回避してビルド
        # 3. std::byte の定義を強制無効化し、型衝突を完全に回避してビルド
    - name: Build with Make
      shell: msys2 {0}
      run: |
        # 1. winsockマクロとの衝突を避けるための変数名置換
        sed -i 's/\bs_addr\b/s_rom_addr/g' ti_lpc.cpp
        
        # 2. GCLed.cpp に不足している FLTK のヘッダーを自動で追加
        sed -i '1i#include <FL/Fl_Group.H>' GCLed.cpp
        
        # 3. _HAS_STD_BYTE=0 フラグを注入してビルド実行（規格は標準に戻します）
        make CXXFLAGS="-O3 -D_HAS_STD_BYTE=0 -DWIN32 -Dcompile_for_windows -Wno-narrowing -Dbuild_date=\"\\\"2026_Jun_22\\\"\" -fpermissive" CFLAGS="-O3 -DWIN32 -Dcompile_for_windows -Wno-narrowing -Dbuild_date=\"\\\"2026_Jun_22\\\"\" -fpermissive" OUT=ti_lpc.exe



    # 4. 実行ファイル（.exe）をGitHub上に保存
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ti_lpc-windows-x64
        path: ti_lpc.exe
